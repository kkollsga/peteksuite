name: docs

# Build the unified documentation site (mkdocs-material), enforce a strict build,
# check links, and run the confidentiality scrub over docs content. This is the
# QUALITY GATE only — the site is hosted on Read the Docs (peteksuite.readthedocs.io),
# which builds from .readthedocs.yaml on its own webhook.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout umbrella
        uses: actions/checkout@v7

      # Clone the exact library release tags named by pyproject.toml for wheel
      # fallbacks. Reviewed guide/notebook copies are committed in the umbrella
      # and are deliberately not overwritten during CI.
      - name: Checkout libraries (suite-pinned tags; best-effort)
        continue-on-error: true
        env:
          PETEK_DOCS_CLONE: "1"
          PETEK_DOCS_CLONE_ONLY: "1"
        run: bash scripts/sync_library_docs.sh

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install docs toolchain
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-docs.txt

      # The Python API Reference (mkdocstrings) imports the built wheels. Try
      # PyPI first (works once published); fall back to building the cloned
      # siblings. Best-effort — a guard step below keeps the build green if a
      # wheel isn't importable yet (the curated reference tables still render).
      - name: Install library wheels (best-effort)
        continue-on-error: true
        run: |
          timeout 180s pip install \
            --no-cache-dir \
            --only-binary=:all: \
            --retries 2 \
            --timeout 20 \
            petektools petekio petekstatic peteksim || true
          for entry in \
            "petektools:_libs/petekTools" \
            "petekio:_libs/petekIO" \
            "petekstatic:_libs/petekStatic" \
            "peteksim:_libs/petekSim/crates/srs-py"; do
            module="${entry%%:*}"
            path="${entry#*:}"
            if python -c "import ${module}" 2>/dev/null; then
              echo "${module} installed from PyPI; skip source fallback"
            elif [ -d "$path" ]; then
              echo "${module} missing; build cloned source fallback"
              pip install "$path" || true
            fi
          done
          true

      - name: Guard reference autodoc (strip blocks for absent wheels)
        run: bash scripts/strip_unimportable_refs.sh

      - name: Confidentiality scrub (docs content)
        env:
          # The full identifier pattern lives in a repo secret so it is never
          # committed (cf. scripts/scrub_docs.sh). Absent the secret, the script
          # falls back to its benign default.
          SCRUB_PATTERNS: ${{ secrets.SCRUB_PATTERNS }}
        run: bash scripts/scrub_docs.sh

      - name: Build (strict)
        run: mkdocs build --strict --site-dir site

      - name: Link check
        continue-on-error: true
        run: |
          pip install linkchecker || true
          linkchecker --check-extern --ignore-url='^https?://' site/index.html || true

      - name: Upload built site (inspection artifact)
        uses: actions/upload-artifact@v7
        with:
          name: site
          path: site
