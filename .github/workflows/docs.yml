name: docs

# Build the unified documentation site (mkdocs-material), enforce a strict build,
# check links, run the confidentiality scrub over docs content, and deploy to
# GitHub Pages.
#
# NOTE: Pages only serves once the repo is public. The build + scrub + link check
# run on every push (the quality gate); the deploy job activates when Pages is
# enabled on a public repo.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout umbrella
        uses: actions/checkout@v4

      # The four libraries are separate repos; check them out as siblings so the
      # sync step can refresh the per-library guides + executed notebooks. These
      # steps are best-effort — the umbrella carries committed copies, so a
      # private/unavailable sibling doesn't fail the build.
      - name: Checkout libraries (best-effort)
        continue-on-error: true
        run: |
          set +e
          for repo in petekTools petekIO petekStatic petekSim; do
            git clone --depth 1 "https://github.com/kkollsga/${repo}.git" "_libs/${repo}" 2>/dev/null \
              && echo "cloned ${repo}" || echo "skip ${repo} (using committed copy)"
          done
          true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs toolchain
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-docs.txt

      # The Python API Reference (mkdocstrings) imports the built wheels. Try
      # PyPI first (works once published); fall back to building the cloned
      # siblings. Best-effort — a guard step below keeps the build green if a
      # wheel isn't importable yet (the curated reference tables still render).
      - name: Install library wheels (best-effort)
        continue-on-error: true
        run: |
          pip install petektools petekio peteksim || true
          for p in _libs/petekTools _libs/petekIO; do
            [ -d "$p" ] && pip install "$p" || true
          done
          [ -d _libs/petekSim/crates/srs-py ] && pip install ./_libs/petekSim/crates/srs-py || true
          true

      - name: Guard reference autodoc (strip blocks for absent wheels)
        run: |
          for slug in petektools petekio peteksim; do
            if ! python -c "import ${slug}" 2>/dev/null; then
              echo "::notice::${slug} not importable — rendering curated reference only"
              # drop the trailing ':::' autodoc block; keep the curated tables
              awk 'BEGIN{skip=0} /^::: /{skip=1} skip==0{print}' \
                "docs/reference/${slug}.md" > "docs/reference/${slug}.md.tmp" \
                && mv "docs/reference/${slug}.md.tmp" "docs/reference/${slug}.md"
            fi
          done

      - name: Sync per-library docs + notebooks
        run: bash scripts/sync_library_docs.sh

      - name: Confidentiality scrub (docs content)
        env:
          # The full identifier pattern lives in a repo secret so it is never
          # committed (cf. scripts/scrub_docs.sh). Absent the secret, the script
          # falls back to its benign default.
          SCRUB_PATTERNS: ${{ secrets.SCRUB_PATTERNS }}
        run: bash scripts/scrub_docs.sh

      - name: Build (strict)
        run: mkdocs build --strict --site-dir site

      - name: Link check
        continue-on-error: true
        run: |
          pip install linkchecker || true
          linkchecker --check-extern --ignore-url='^https?://' site/index.html || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    # Activates once Pages is enabled (public repo). Safe to keep — it no-ops
    # until Pages is configured.
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
