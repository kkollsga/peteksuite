# Read the Docs build for the petekSuite unified documentation site.
# Reproduces the GitHub Actions `docs` workflow (.github/workflows/docs.yml):
# ubuntu-24.04 · Python 3.12 · mkdocs-material built from mkdocs.yml, strict.
#
# Unlike CI, Read the Docs checks out ONLY this umbrella repo, so the four
# library release tags pinned by pyproject.toml are cloned over public HTTPS in
# the pre_build phase for wheel fallbacks. Reviewed guides and notebooks remain
# the copies committed here instead of drifting during the documentation build.
# The umbrella carries committed copies, so a clone that fails still builds.
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  jobs:
    # RTD order: checkout -> create env -> python.install -> pre_build -> mkdocs build.
    pre_build:
      # 1. Clone suite-pinned tags for wheel fallbacks while preserving the
      #    reviewed guide/notebook copies committed in the umbrella.
      - PETEK_DOCS_CLONE=1 PETEK_DOCS_CLONE_ONLY=1 bash scripts/sync_library_docs.sh
      # 2. The Python API Reference (mkdocstrings) imports the built wheels.
      #    Best-effort, mirroring CI: try PyPI first (once published), then build
      #    from the freshly cloned source trees. Rust may be absent on RTD, so a
      #    source build can fail — the guard step below keeps the build green.
      - pip install petektools petekio petekstatic peteksim || true
      - for entry in "petektools:_libs/petekTools" "petekio:_libs/petekIO" "petekstatic:_libs/petekStatic" "peteksim:_libs/petekSim/crates/srs-py"; do module="${entry%%:*}"; path="${entry#*:}"; python -c "import ${module}" 2>/dev/null && echo "${module} installed from PyPI; skip source fallback" && continue; [ -d "$path" ] && echo "${module} missing; build cloned source fallback" && pip install "$path" || true; done
      # 3. Degrade gracefully: for any library whose wheel is not importable,
      #    strip the trailing ':::' autodoc block from its reference page so the
      #    curated tables still render under --strict.
      - bash scripts/strip_unimportable_refs.sh
      # 4. Confidentiality tripwire over docs content. The identifier patterns are
      #    injected via $SCRUB_PATTERNS in CI; absent on RTD, the benign default
      #    (machine-path leak guard) still runs.
      - bash scripts/scrub_docs.sh

# The mkdocs toolchain (mkdocs, material, mkdocstrings, jupyter, black). The four
# library wheels are installed best-effort in pre_build (step 2). Current release
# floors: petektools>=0.2.15, petekio>=0.3.15, petekstatic>=0.1.13,
# peteksim>=0.1.13.
python:
  install:
    - requirements: requirements-docs.txt

mkdocs:
  configuration: mkdocs.yml
  fail_on_warning: true   # == `mkdocs build --strict`
